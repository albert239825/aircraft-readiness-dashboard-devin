<div class="aircraft-container">
    <div class="header">
        <h1>Aircraft Fleet</h1>
        <mat-form-field appearance="outline" class="filter-field">
            <mat-label>Search</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="Filter by any field">
            <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
    </div>

    <div *ngIf="isLoading" class="loading">
        <mat-spinner diameter="50"></mat-spinner>
    </div>

    <mat-error *ngIf="errorMessage" class="error">
        {{ errorMessage }}
    </mat-error>

    <div class="table-container" *ngIf="!isLoading && !errorMessage">
        <table mat-table [dataSource]="dataSource" matSort class="aircraft-table">

            <!-- Tail Number Column -->
            <ng-container matColumnDef="tailNumber">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Tail Number</th>
                <td mat-cell *matCellDef="let aircraft">{{ aircraft.tailNumber }}</td>
            </ng-container>

            <!-- Aircraft Type Column -->
            <ng-container matColumnDef="aircraftType">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Type</th>
                <td mat-cell *matCellDef="let aircraft">{{ aircraft.aircraftType }}</td>
            </ng-container>

            <!-- Base Column -->
            <ng-container matColumnDef="base">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Base</th>
                <td mat-cell *matCellDef="let aircraft">{{ aircraft.base }}</td>
            </ng-container>

            <!-- Status Column -->
            <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
                <td mat-cell *matCellDef="let aircraft">
                    <span class="status-badge" [ngClass]="getStatusClass(aircraft.status)">
                        {{ aircraft.status }}
                    </span>
                </td>
            </ng-container>

            <!-- Next Inspection Date Column -->
            <ng-container matColumnDef="nextInspectionDate">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Next Inspection</th>
                <td mat-cell *matCellDef="let aircraft">{{ aircraft.nextInspectionDate | date:'mediumDate' }}</td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="onRowClick(row)"
                class="clickable-row"></tr>
        </table>

        <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
    </div>
</div>
