<div class="work-orders-container">
    <div class="header">
        <h1>Work Orders</h1>
        <div class="header-actions">
            <mat-form-field appearance="outline" class="filter-field">
                <mat-label>Search</mat-label>
                <input matInput (keyup)="applyFilter($event)" placeholder="Filter by any field">
                <mat-icon matSuffix>search</mat-icon>
            </mat-form-field>
            <button mat-raised-button color="primary" (click)="onCreateWorkOrder()">
                <mat-icon>add</mat-icon>
                Create Work Order
            </button>
        </div>
    </div>

    <div *ngIf="isLoading" class="loading">
        <mat-spinner diameter="50"></mat-spinner>
    </div>

    <mat-error *ngIf="errorMessage" class="error">
        {{ errorMessage }}
    </mat-error>

    <div class="table-container" *ngIf="!isLoading && !errorMessage">
        <table mat-table [dataSource]="dataSource" matSort class="work-orders-table">

            <!-- Work Order ID Column -->
            <ng-container matColumnDef="workOrderId">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>WO ID</th>
                <td mat-cell *matCellDef="let wo">{{ wo.workOrderId }}</td>
            </ng-container>

            <!-- Tail Number Column -->
            <ng-container matColumnDef="tailNumber">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Tail Number</th>
                <td mat-cell *matCellDef="let wo">{{ wo.tailNumber }}</td>
            </ng-container>

            <!-- Title Column -->
            <ng-container matColumnDef="title">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Title</th>
                <td mat-cell *matCellDef="let wo">{{ wo.title }}</td>
            </ng-container>

            <!-- Priority Column -->
            <ng-container matColumnDef="priority">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Priority</th>
                <td mat-cell *matCellDef="let wo">
                    <span class="priority-badge" [ngClass]="getPriorityClass(wo.priority)">
                        {{ wo.priority }}
                    </span>
                </td>
            </ng-container>

            <!-- Status Column -->
            <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
                <td mat-cell *matCellDef="let wo">
                    <span class="status-badge" [ngClass]="getStatusClass(wo.status)">
                        {{ wo.status }}
                    </span>
                </td>
            </ng-container>

            <!-- Created At Column -->
            <ng-container matColumnDef="createdAt">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Created</th>
                <td mat-cell *matCellDef="let wo">{{ wo.createdAt | date:'short' }}</td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let wo">
                    <button mat-icon-button (click)="onEditWorkOrder(wo)" matTooltip="Edit">
                        <mat-icon>edit</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
    </div>
</div>
