<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Air Fleet Readiness Dashboard</mat-card-title>
      <mat-card-subtitle>Demo Login</mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content>
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput
                 [(ngModel)]="username"
                 name="username"
                 required
                 autocomplete="username">
          <mat-icon matSuffix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput
                 [type]="hidePassword ? 'password' : 'text'"
                 [(ngModel)]="password"
                 name="password"
                 required
                 autocomplete="current-password">
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
        </mat-form-field>

        <mat-error *ngIf="errorMessage" class="error-message">
          {{ errorMessage }}
        </mat-error>

        <button mat-raised-button color="primary" type="submit" class="full-width login-button">
          Login
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer>
      <p class="demo-hint">
        <strong>Demo Users:</strong><br>
        viewer/pass | maintainer/pass | admin/pass
      </p>
    </mat-card-footer>
  </mat-card>
</div>
